name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  quality:
    name: Quality (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: "22"
          cache: npm
      - run: npm ci
      - name: Verify lockfile integrity
        run: npm ci --ignore-scripts
      - run: npm run typecheck
      - run: npm run lint
      - run: npm run test
      - run: npm run coverage
      - run: npm run build
      - run: npm audit --audit-level=high

  e2e:
    name: E2E + a11y
    runs-on: ubuntu-latest
    needs: quality
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: "22"
          cache: npm
      - run: npm ci
      - run: npm run build
      - run: npx playwright install chromium --with-deps
      - run: npm run test:e2e
      - run: npm run test:a11y

  smoke:
    name: Health smoke
    runs-on: ubuntu-latest
    needs: quality
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: "22"
          cache: npm
      - run: npm ci
      - run: npm run build
      - name: Start server and probe /api/health
        run: |
          npm run start &
          SERVER_PID=$!
          for i in $(seq 1 30); do
            if curl -fsS http://localhost:3000/api/health > health.json; then
              echo "Health OK"; cat health.json; break
            fi
            sleep 2
          done
          node -e "const h=require('./health.json'); if(h.status!=='ok'){process.exit(1)}"
          kill $SERVER_PID
